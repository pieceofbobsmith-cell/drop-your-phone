<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <span class="title">DROP YOUR PHONE</span>
  </div>

  <div class="row">
    <div class="label">TRACKER BLOCKING</div>
    <label class="toggle">
      <input type="checkbox" id="blockingToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="count-block">
    <span id="blockedCount">0</span>
    <span class="count-label">trackers blocked this session</span>
  </div>

  <div class="divider"></div>

  <button id="playBtn">&#9654; PLAY: DROP YOUR PHONE</button>

  <div class="desc">
    A social justice art piece about surveillance,<br>
    data brokers, and ICE deportation.
  </div>

  <script src="popup.js"></script>
</body>
</html>
