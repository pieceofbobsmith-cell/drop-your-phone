<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body style="font-family:monospace;padding:20px;background:#111;color:#4fc3f7">
<h2>Icon Generator — Drop Your Phone</h2>
<p>Click each button to download the icon PNG. Save them to the <code>icons/</code> folder.</p>
<br>
<button onclick="gen(16)">Download icon16.png</button>
<button onclick="gen(48)">Download icon48.png</button>
<button onclick="gen(128)">Download icon128.png</button>
<canvas id="c" style="display:none"></canvas>
<script>
function gen(size) {
  const c = document.getElementById('c');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  // Dark background
  ctx.fillStyle = '#0f1117';
  ctx.fillRect(0, 0, size, size);
  // Phone shape
  const pw = size * 0.3, ph = size * 0.5;
  const px = (size - pw) / 2, py = (size - ph) / 2;
  ctx.fillStyle = '#4fc3f7';
  ctx.fillRect(px, py, pw, ph);
  // Screen
  ctx.fillStyle = '#0a0c12';
  ctx.fillRect(px+2, py+3, pw-4, ph-8);
  // Signal dot (red, danger)
  ctx.fillStyle = '#ef5350';
  ctx.beginPath();
  ctx.arc(size*0.72, size*0.28, size*0.1, 0, Math.PI*2);
  ctx.fill();

  const a = document.createElement('a');
  a.download = `icon${size}.png`;
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
